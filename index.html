<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style/style.css">
    <title>Browser Prompt Demo</title>
</head>

<body>
    <header>
        <h1>Browser Prompt Demonstration</h1>
    </header>
    <p id="your-name"></p>
    <div id="controls">
        <button type="button" id="enter-name-btn">Enter Your Name</button>
        <button type="button" id="update-name-btn">Update Your Name</button>
        <button type="button" id="delete-name-btn">Delete Your Name</button>
        <script type="text/javascript" src="./javascript/prompts.js"></script>
        <script src="https://www.datadoghq-browser-agent.com/datadog-rum-v4.js" type="text/javascript">
        </script>
        <script>
            window.DD_RUM && window.DD_RUM.init({
                clientToken: DD_RUM_CLIENT_TOKEN,
                applicationId: DD_RUM_APPLICATION_ID,
                site: 'datadoghq.com',
                service: 'browser-prompts',

                // Specify a version number to identify the deployed version of your application in Datadog 
                // version: '1.0.0',
                sampleRate: 100,
                premiumSampleRate: 100,
                trackInteractions: true,
                defaultPrivacyLevel: 'mask-user-input',
            });

            window.DD_RUM &&
                window.DD_RUM.startSessionReplayRecording();
        </script>
    </div>
</body>

</html>
