<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style/style.css">
    <title>Browser Prompt Demo</title>
</head>

<body>
    <header>
        <h1>Browser Prompt Demonstration</h1>
    </header>
    <p id="your-name"></p>
    <div id="controls">
        <button type="button" id="enter-name-btn">Enter Your Name</button>
        <button type="button" id="update-name-btn">Update Your Name</button>
        <button type="button" id="delete-name-btn">Delete Your Name</button>
    </div>
    <!--Form BELOW is Invisible-->
    <form id="test-form">
        <label for="test-items">Choose an Item:</label>
        <select id="items" name="items">
            <option id="item-list-1" value="item1">Item #1</option>
            <option id="item-list-2" value="item2">Item #2</option>
            <option id="item-list-3" value="item3">Item #3</option>
            <option id="item-list-4" value="item4">Item #4</option>
        </select>
    </form>
    <!--Form ABOVE is Invisible-->
    <!--Form BELOW is VISIBLE-->
    <form id="test-form-visible">
        <label for="test-items-visible">Choose an Item:</label>
        <select id="items" name="items">
            <option>Item #0</option>
            <option>Item #1</option>
            <option>Item #2</option>
            <option>Item #3</option>
            <option>Item #4</option>
        </select>
    </form>
    <h3>Below are Some Test Links...</h3>
    <a href="./big-dummy-file.txt" target="_blank">Download Big Dummy .txt File</a>
    <br><br>
    <a href="./mymovie.mov">Download Big Dummy .mov File</a>
    <br><br>
    <a href="https://www.datadoghq.com/" target="_blank">Open DatadogHQ Site on New Tab</a>
    <br>
    <a href="" target="popup" onclick="window.open('https://www.datadoghq.com/', 'name', 'width=600,height=400')">Open DatadogHQ Site in a Popup Window</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"
        integrity="sha512-CryKbMe7sjSCDPl18jtJI5DR5jtkUWxPXWaLCst6QjH8wxDexfRJic2WRmRXmstr2Y8SxDDWuBO6CQC6IE4KTA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/javascript" src="./javascript/prompts.js"></script>
</body>

</html>
