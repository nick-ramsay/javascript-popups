<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style/style.css">
    <title>Browser Prompt Demo</title>
</head>

<body>
    <header>
        <h1>Browser Prompt Demonstration</h1>
    </header>
    <p id="your-name"></p>
    <div id="controls">
        <button type="button" id="enter-name-btn">Enter Your Name</button>
        <button type="button" id="update-name-btn">Update Your Name</button>
        <button type="button" id="delete-name-btn">Delete Your Name</button>
    </div>
    <form id="test-form">
        <label for="test-items">Choose an Item:</label>
        <select id="items" name="items">
            <option value="item1">Item #1</option>
            <option value="item2">Item #2</option>
            <option value="item3">Item #3</option>
            <option value="item4">Item #4</option>
        </select>
    </form>
    <script type="text/javascript" src="./javascript/prompts.js"></script>
</body>

</html>
